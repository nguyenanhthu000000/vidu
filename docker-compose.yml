version: "3.9"

services:
  backend:
    build: ./backend
    container_name: rag-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/cache:/app/cache
    env_file:
      - .env
    restart: always

  frontend:
    build: ./frontend
    container_name: rag-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always